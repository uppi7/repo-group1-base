# 【本地开发环境】三个服务统一用 Docker 管理，组员无需在本机安装 Python/Node
# 合并到大盘后此文件不再使用
services:

  # ---- 数据库 ----
  mysql-base-dev:
    image: mysql:8.0
    container_name: mysql-base-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: db_base
    ports:
      - "3306:3306"
    volumes:
      - mysql_base_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASS}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- 后端 ----
  backend-base-dev:
    build: ./backend          # 构建时 pip install；源码通过 volume 覆盖实现热重载
    container_name: backend-base-dev
    volumes:
      - ./backend:/app        # 宿主机源码实时同步进容器
    environment:
      DB_HOST: mysql-base-dev # 容器内用 service name 寻址，不用 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: db_base
      FLASK_DEBUG: "true"     # 开启 Flask Reloader，修改 app.py 后自动重启
    ports:
      - "8081:8081"
    depends_on:
      mysql-base-dev:
        condition: service_healthy

  # ---- 前端 ----
  frontend-base-dev:
    image: node:20-alpine
    container_name: frontend-base-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules_base:/app/node_modules  # node_modules 用独立 volume，避免宿主机覆盖
    environment:
      # 容器内 proxy 目标用 service name，不用 127.0.0.1
      VITE_BACKEND_URL: http://backend-base-dev:8081
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend-base-dev

volumes:
  mysql_base_dev_data:
  node_modules_base:
